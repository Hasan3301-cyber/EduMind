name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --check
      - name: Build
        run: cargo build --workspace
      - name: Validate example configuration
        run: cargo run -p edumind -- --config edumind/config.example.yaml --check-config
      - name: Test
        run: cargo test --workspace
      - name: Premium evaluation thresholds
        run: cargo test -p edumind --test premium_evaluation
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

  desktop:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: edumind-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: edumind-tauri/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test
      - name: Embedded gateway lifecycle smoke
        run: cargo test --manifest-path src-tauri/Cargo.toml
      - name: Node safety tests
        run: npm run test:safety
      - name: Install Playwright browser
        run: npx playwright install chromium
      - name: Browser smoke tests
        run: npm run test:e2e
      - name: Premium workflow thresholds
        run: npx playwright test e2e/premium-workflows.spec.js
      - name: Production build
        run: npm run build
      - name: Build Windows desktop bundles
        run: npm run tauri -- build
      - name: Upload Windows desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: edumind-windows-installers
          path: |
            edumind-tauri/src-tauri/target/release/bundle/msi/*.msi
            edumind-tauri/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  mobile:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - uses: android-actions/setup-android@v3
      - name: Assemble and lint
        run: .\gradlew.bat :app:assembleDebug :app:lintDebug
